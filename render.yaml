services:
  - type: web
    name: research-os-api-achk
    runtime: docker
    branch: main
    autoDeployTrigger: checksPass
    healthCheckPath: /v1/health/ready
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: http://localhost:5173,https://app.axiomos.studio
      - key: AAWE_BOOTSTRAP_EMAIL
        sync: false
      - key: AAWE_BOOTSTRAP_PASSWORD
        sync: false
      - key: AAWE_BOOTSTRAP_NAME
        value: AAWE Test User
      - key: AAWE_BOOTSTRAP_EMAIL_VERIFIED
        value: "1"
      - key: AAWE_BOOTSTRAP_FORCE_PASSWORD
        value: "0"
  - name: research-os-ui-achk
    type: web
    runtime: static
    branch: main
    autoDeployTrigger: checksPass
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.axiomos.studio
      - key: VITE_TEST_ACCOUNT_EMAIL
        sync: false
      - key: VITE_TEST_ACCOUNT_PASSWORD
        sync: false
