name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce Node dependency boundaries
        run: |
          set -euo pipefail
          if [ -f "package.json" ] && [ "${ALLOW_ROOT_PACKAGE_JSON:-0}" != "1" ]; then
            echo "::error::Unexpected root package.json found. Set ALLOW_ROOT_PACKAGE_JSON=1 only for intentional root-level Node setup."
            exit 1
          fi
          if [ -f "package-lock.json" ]; then
            echo "::error::Unexpected root package-lock.json found. Remove it and keep Node lockfile under frontend/package-lock.json."
            exit 1
          fi
          if [ ! -f "frontend/package.json" ]; then
            echo "::error::Missing frontend/package.json. Expected frontend dependency manifest at frontend/package.json."
            exit 1
          fi
          if [ ! -f "frontend/package-lock.json" ]; then
            echo "::error::Missing frontend/package-lock.json. Expected frontend lockfile at frontend/package-lock.json."
            exit 1
          fi
          echo "Node dependency boundary checks passed."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Detect changed Python files
        id: changed-python
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          git diff --name-only "${BASE_SHA}" HEAD -- '*.py' > changed-python-files.txt
          CHANGED_COUNT="$(grep -c '.' changed-python-files.txt || true)"
          echo "count=${CHANGED_COUNT}" >> "${GITHUB_OUTPUT}"

          if [ "${CHANGED_COUNT}" -gt 0 ]; then
            echo "Changed Python files:"
            cat changed-python-files.txt
          else
            echo "No changed Python files detected."
          fi

      - name: Detect changed frontend files
        id: changed-frontend
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          git diff --name-only "${BASE_SHA}" HEAD -- 'frontend/**' > changed-frontend-files.txt
          CHANGED_COUNT="$(grep -c '.' changed-frontend-files.txt || true)"
          echo "count=${CHANGED_COUNT}" >> "${GITHUB_OUTPUT}"

          if [ "${CHANGED_COUNT}" -gt 0 ]; then
            echo "Changed frontend files:"
            cat changed-frontend-files.txt
          else
            echo "No changed frontend files detected."
          fi

      - name: Detect backend pytest targets
        id: pytest-targets
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          git diff --name-only "${BASE_SHA}" HEAD -- 'src/research_os/**' 'tests/**' 'alembic/**' 'Dockerfile' 'scripts/oa-browser-fetch/**' > changed-backend-files.txt
          python - <<'PY'
          from pathlib import Path

          changed = [
              line.strip()
              for line in Path("changed-backend-files.txt").read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          targets: list[str] = []

          def add(path: str) -> None:
              normalized = path.replace("\\", "/")
              if Path(normalized).exists() and normalized not in targets:
                  targets.append(normalized)

          for path in changed:
              normalized = path.replace("\\", "/")
              file_path = Path(normalized)
              if normalized.startswith("tests/") and normalized.endswith(".py"):
                  add(normalized)
                  continue
              if normalized.startswith("src/research_os/services/") and normalized.endswith(".py"):
                  add(f"tests/test_{file_path.stem}.py")
                  continue
              if normalized.startswith("src/research_os/api/"):
                  add("tests/test_api.py")
                  continue
              if normalized == "src/research_os/db.py" or normalized.startswith("alembic/"):
                  add("tests/test_db_schema_integrity.py")
                  add("tests/test_db_storage_stability.py")
                  continue
              if normalized == "Dockerfile" or normalized.startswith("scripts/oa-browser-fetch/"):
                  add("tests/test_publication_console_service.py")
                  add("tests/test_open_access_service.py")

          output_path = Path("pytest-targets.txt")
          output_path.write_text("\n".join(targets), encoding="utf-8")
          print(f"Selected pytest targets: {targets if targets else 'none'}")
          PY

          TARGET_COUNT="$(grep -c '.' pytest-targets.txt || true)"
          echo "count=${TARGET_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        if: steps.changed-python.outputs.count != '0'
        shell: bash
        run: xargs -r ruff format --check < changed-python-files.txt

      - name: Run lint checks
        if: steps.changed-python.outputs.count != '0'
        shell: bash
        run: xargs -r ruff check < changed-python-files.txt

      - name: Enforce documentation updates for major changes
        env:
          DOCS_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python scripts/verify_change_documentation.py

      - name: Run tests
        if: steps.pytest-targets.outputs.count != '0'
        shell: bash
        run: xargs -r python -m pytest -q < pytest-targets.txt

      - name: Validate Render blueprint YAML
        run: |
          python -c "from pathlib import Path; import yaml; p = Path('render.yaml'); assert p.exists(), 'render.yaml missing'; yaml.safe_load(p.read_text(encoding='utf-8'))"

      - name: Build Docker image
        run: docker build -t research-os-api .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          if [ "${{ steps.changed-frontend.outputs.count }}" != "0" ]; then
            npm run design:governance
          else
            echo "Skipping design governance: no frontend files changed."
          fi
          npm run build
          test -f dist/index.html
          test -f dist/404.html
