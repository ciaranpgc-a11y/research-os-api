###############################################################################
# Hetzner self-hosted deployment
#
# Brings up three services:
#   1. api     – the Research-OS FastAPI backend
#   2. grobid  – GROBID PDF parser (co-located for speed)
#   3. caddy   – reverse-proxy with automatic HTTPS
#
# Quick start:
#   cp .env.example .env          # fill in secrets
#   docker compose up -d --build  # build & launch
#   docker compose logs -f api    # watch API logs
#
# See docs/DEPLOYMENT.md for the full guide.
###############################################################################

services:
  # ── Reverse proxy ─────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
      grobid:
        condition: service_started

  # ── Frontend SPA ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.production
      args:
        VITE_API_BASE_URL: https://api.axiomos.studio
        VITE_TEST_ACCOUNT_EMAIL: ${VITE_TEST_ACCOUNT_EMAIL:-}
        VITE_TEST_ACCOUNT_PASSWORD: ${VITE_TEST_ACCOUNT_PASSWORD:-}
    restart: unless-stopped
    expose:
      - "80"

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - api-data:/var/data
    env_file:
      - .env
    environment:
      - PORT=8000
      - PUB_GROBID_BASE_URL=http://grobid:8070
      - DATA_LIBRARY_ROOT=/var/data/data_library_store
      - PUBLICATION_FILES_ROOT=/var/data/publication_files_store
    depends_on:
      grobid:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health/ready')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── GROBID PDF parser ────────────────────────────────────────────────────
  grobid:
    image: lfoppiano/grobid:0.8.1
    restart: unless-stopped
    expose:
      - "8070"

  # ── Optional preview API ──────────────────────────────────────────────────
  api-preview:
    build: .
    restart: unless-stopped
    profiles: ["preview"]
    expose:
      - "8000"
    volumes:
      - api-preview-data:/var/data
    env_file:
      - .env.preview
    environment:
      - PORT=8000
      - PUB_GROBID_BASE_URL=http://grobid:8070
      - DATA_LIBRARY_ROOT=/var/data/data_library_store
      - PUBLICATION_FILES_ROOT=/var/data/publication_files_store
    depends_on:
      grobid:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health/ready')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── Optional preview frontend ─────────────────────────────────────────────
  frontend-preview:
    build:
      context: .
      dockerfile: frontend/Dockerfile.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://preview-api.axiomos.studio}
        VITE_TEST_ACCOUNT_EMAIL: ${VITE_TEST_ACCOUNT_EMAIL:-}
        VITE_TEST_ACCOUNT_PASSWORD: ${VITE_TEST_ACCOUNT_PASSWORD:-}
    restart: unless-stopped
    profiles: ["preview"]
    expose:
      - "80"

volumes:
  api-data:
  api-preview-data:
  caddy-data:
  caddy-config:
